    contents:
      - cgmsleepLink
      - cgmactivityLink
      - cgmactivityVisualise
      - cgmprhLink
      - cgmprhVisualise
      - sdhprhLink
  - subtitle: Data
    contents:
      - cgm
      - raw_checkin
      - raw_cgm
      - raw_eq5d5l
      - raw_hr
      - raw_motif_segment
