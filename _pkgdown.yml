template:
  bootstrap: 5
params:
logo: "logo.png"
url: https://leicester-cdag.github.io/hypometrics/
destination: docs
navbar:
  type: default
  left:
  - text: Tutorials
    icon: fa fa-book-reader
    href: articles/index.html
    aria-label: Articles
    menu:
      - text: Continuous Glucose Monitoring (CGM) Data
        href: articles/cgm_data.html
      - text: Physical Activity Data
        href: articles/activity_data.html
      - text: Sleep Data
        href: articles/sleep_data.html
      - text: Person-Reported Hypoglycaemia Data
        href: articles/umotif_data.html
      - text: Linking Data
        href: articles/linking_data.html
  - text: Functions
    icon: fa fa-file-code
    href: reference/index.html
    aria-label: Reference

articles:
- title: Tutorials
  navbar: ~
  contents:
  - cgm_data
  - activity_data
  - sleep_data
  - umotif_data
  - linking_data

reference:
  - title: Package Index
  - subtitle: CGM functions
    desc: |
      Functions for managing CGM data
    contents:
      - cgmCheck
      - cgmInterpolate
      - cgmSummarise
      - cgmVisualise
      - sdhDetection
      - sdhSummarise
  - subtitle: Physical Activity functions
    desc: |
      Functions for managing physical activity data
    contents:
      - activityRead
      - activityVisualise
  - subtitle: Sleep functions
    desc: |
      Functions for managing sleep data
    contents:
      - sleepRead
      - sleepCategorise
      - sleepSummarise
      - sleepVisualise
  - subtitle: uMotif functions
    desc: |
      Functions for managing uMotif data
    contents:
      - umotifRead
      - umotifClean
      - prhLink
      - prhSummarise
      - prhVisualise
  - subtitle: Linking functions
    desc: |
